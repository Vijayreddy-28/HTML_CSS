<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Study Image Slider</title>
    <link rel="stylesheet" href="task7.css" />
  </head>
  <body>
    <div class="slider">
      <!-- Controls -->
      <input type="radio" name="slide" id="s1" checked />
      <input type="radio" name="slide" id="s2" />
      <input type="radio" name="slide" id="s3" />
      <input type="radio" name="slide" id="s4" />

      <!-- Slides -->
      <div class="slides">
        <div class="slide">
          <img src="images/1jpj.webp" />
          <div class="overlay">
            <h2>Foundation</h2>
            <p>Learn basics (HTML, CSS, JS)</p>
          </div>
        </div>

        <div class="slide">
          <img src="images/2jpj.webp" />
          <div class="overlay">
            <h2>Development</h2>
            <p>Build real projects</p>
          </div>
        </div>

        <div class="slide">
          <img src="images/3jpj.webp" />
          <div class="overlay">
            <h2>Specialization</h2>
            <p>AI / ML / MERN</p>
          </div>
        </div>

        <div class="slide">
          <img src="images/4.jpg" />
          <div class="overlay">
            <h2>Execution</h2>
            <p>Portfolio + Placement</p>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <div class="nav">
        <label for="s1"></label>
        <label for="s2"></label>
        <label for="s3"></label>
        <label for="s4"></label>
      </div>
    </div>
  </body>
</html>
