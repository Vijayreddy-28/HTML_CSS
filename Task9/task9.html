<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Deep Work Dashboard</title>
    <link rel="stylesheet" href="task9.css" />
  </head>
  <body>
    <header class="header">
      <h1>Deep Work System</h1>
    </header>

    <div class="container">
      <aside class="sidebar">
        <h3>Focus Areas</h3>
        <ul>
          <li>🚀 MERN Stack</li>
          <li>🧠 AI / ML</li>
          <li>📊 DSA</li>
          <li>🗄 DBMS</li>
        </ul>
      </aside>

      <main class="main">
        <section class="hero">
          <h2>⚡ Priority Task</h2>
          <p>Build VQA Model + Revise CNN</p>
        </section>
        <section class="card progress">
          <h3>Progress</h3>
          <div class="bar"><span style="width: 70%"></span></div>
          <div class="bar"><span style="width: 90%"></span></div>
        </section>

        <section class="card tasks">
          <h3>Today's Tasks</h3>
          <ul>
            <li>✔ CNN revision</li>
            <li>⬜ React UI</li>
            <li>⬜ DSA problems</li>
          </ul>
        </section>

        <section class="card schedule">
          <h3>Schedule</h3>
          <p>Morning → Coding</p>
          <p>Afternoon → Project</p>
          <p>Night → Revision</p>
        </section>
        <section class="focus-box">⏳ 2H DEEP WORK</section>
      </main>
    </div>
  </body>
</html>
