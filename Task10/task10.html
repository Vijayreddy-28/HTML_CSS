<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Only Multi-Page Simulator</title>
    <link rel="stylesheet" href="task10.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="nav">
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <!-- Pages -->
    <main class="pages">
      <section id="home" class="page">
        <h1>Welcome to Home</h1>
        <p>This is the home page simulated with CSS only.</p>
      </section>

      <section id="about" class="page">
        <h1>About Us</h1>
        <p>Learn more about our mission and values.</p>
      </section>

      <section id="services" class="page">
        <h1>Our Services</h1>
        <p>Discover the services we provide to our clients.</p>
      </section>

      <section id="contact" class="page">
        <h1>Contact</h1>
        <p>Get in touch with us via email or phone.</p>
      </section>
    </main>
  </body>
</html>
