<!doctype html>
<html>
  <head>
    <title>Modal Checkbox</title>
    <link href="task5.css" rel="Stylesheet" />
  </head>
  <body>
    <label for="toggle" class="btn">Open Modal</label>
    <input type="checkbox" id="toggle" />
    <div class="modal">
      <div class="modal-box">
        <label for="toggle" class="close">&times;</label>
        <h2>Thank You</h2>
        <p>We are glad to visting our page.</p>
      </div>
    </div>
  </body>
</html>
